<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CAGE/RS – Plano de Auditoria</title>
<style>
  :root{
    --cage-navy:#002060; --cage-teal:#00C4B3; --cage-red:#C00000; --cage-yellow:#FFFF00;
    --crit-bg:#FF9F9F; --crit-tx:#5A0000;
    --alto-bg:#FFE285; --alto-tx:#5A3D00;
    --mod-bg:#FFFFBD;  --mod-tx:#5A5A00;
    --baixo-bg:#B5E6A2;--baixo-tx:#1E4A12;
    --irr-bg:#ECECEC;  --irr-tx:#444;
    --line:#d4d9e6; --bg:#f3f5fa; --card:#fff; --muted:#5a6580;
  }
  *{box-sizing:border-box}
  html,body{margin:0;padding:0}
  body{font-family:'Segoe UI',system-ui,Roboto,sans-serif;background:var(--bg);color:#1b2233;font-size:14px;line-height:1.45}
  a{color:var(--cage-navy)}
  /* Top bar */
  header.appbar{background:var(--cage-navy);color:#fff;display:flex;align-items:center;gap:14px;padding:8px 16px;position:sticky;top:0;z-index:50;box-shadow:0 2px 6px rgba(0,0,0,.18)}
  header.appbar img{height:38px;width:auto;background:#fff;border-radius:4px;padding:3px}
  header.appbar h1{font-size:18px;margin:0;font-weight:600;letter-spacing:.2px;flex:1}
  .topctx{font-size:12px;color:#cfe3ff;text-align:right;min-width:160px}
  .topctx b{color:#fff}
  .toolbar{background:#001640;display:flex;flex-wrap:wrap;gap:6px;padding:6px 16px;align-items:center;position:sticky;top:54px;z-index:49}
  .toolbar .sep{flex:1}
  button{font-family:inherit;font-size:13px;cursor:pointer;border:none;border-radius:6px;padding:7px 12px;background:#e7ebf5;color:#1b2233;transition:filter .12s}
  button:hover{filter:brightness(.95)}
  button.primary{background:var(--cage-teal);color:#003c36;font-weight:600}
  button.navy{background:#0a347a;color:#fff}
  button.danger{background:var(--cage-red);color:#fff}
  button.ghost{background:transparent;color:#cfe3ff;border:1px solid #2a4a86}
  button.sm{padding:3px 8px;font-size:12px;border-radius:5px}
  .savestate{font-size:12px;color:#9fc3ff;margin-left:4px;white-space:nowrap}
  /* Layout */
  .wrap{display:flex;min-height:calc(100vh - 96px)}
  nav.side{width:260px;background:#fff;border-right:1px solid var(--line);padding:10px 0;flex-shrink:0}
  nav.side .navitem{display:flex;align-items:center;gap:8px;padding:9px 14px;cursor:pointer;border-left:3px solid transparent;font-size:13.5px}
  nav.side .navitem:hover{background:#eef2fb}
  nav.side .navitem.active{background:#e7eefc;border-left-color:var(--cage-teal);font-weight:600;color:var(--cage-navy)}
  nav.side .navitem .pct{margin-left:auto;font-size:11px;color:#fff;background:#9aa6c2;border-radius:10px;padding:1px 7px;min-width:34px;text-align:center}
  nav.side .navitem.active .pct,nav.side .navitem .pct.full{background:var(--cage-teal);color:#003c36}
  nav.side .group{font-size:11px;text-transform:uppercase;letter-spacing:.6px;color:var(--muted);padding:12px 14px 4px}
  main{flex:1;padding:18px 22px;max-width:1180px}
  /* Cards / fields */
  .card{background:var(--card);border:1px solid var(--line);border-radius:10px;padding:16px 18px;margin-bottom:16px;box-shadow:0 1px 2px rgba(20,40,90,.04)}
  .card h2{margin:0 0 4px;font-size:18px;color:var(--cage-navy)}
  .card .sub{color:var(--muted);font-size:12.5px;margin-bottom:12px}
  .sectionbar{background:var(--cage-navy);color:#fff;padding:8px 12px;border-radius:8px 8px 0 0;font-weight:600;font-size:14px;margin:-16px -18px 14px}
  .field{margin-bottom:13px}
  .field label{display:flex;align-items:center;gap:6px;font-weight:600;font-size:12.5px;margin-bottom:4px;color:#2a3550}
  .grid2{display:grid;grid-template-columns:1fr 1fr;gap:0 16px}
  .grid3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:0 16px}
  .grid-dt{display:grid;grid-template-columns:2fr 1fr;gap:0 12px}
  input[type=text],input[type=date],select,textarea{width:100%;font-family:inherit;font-size:13.5px;padding:7px 9px;border:1px solid var(--line);border-radius:6px;background:#fff;color:#1b2233}
  input:focus,select:focus,textarea:focus{outline:2px solid var(--cage-teal);outline-offset:-1px;border-color:var(--cage-teal)}
  textarea{resize:vertical;min-height:64px}
  select[disabled],input[readonly]{background:#eef1f7;color:#5a6580}
  .req-empty{border-color:var(--cage-red)!important;background:#fff6f6}
  .info{cursor:help;color:var(--cage-teal);font-size:13px;border:1px solid var(--cage-teal);border-radius:50%;width:16px;height:16px;display:inline-flex;align-items:center;justify-content:center;font-style:normal;font-weight:700;line-height:1;flex-shrink:0}
  .hint{display:none;background:#001640;color:#eaf1ff;font-size:12px;font-weight:400;padding:8px 10px;border-radius:6px;margin-top:5px;line-height:1.4}
  .hint.show{display:block}
  /* dynamic item */
  .dyn{border:1px solid var(--line);border-radius:8px;padding:10px 12px;margin-bottom:10px;background:#fbfcfe}
  .dyn .dhead{display:flex;align-items:center;gap:8px;margin-bottom:8px}
  .dyn .dhead .ref{font-weight:700;color:var(--cage-navy)}
  .dyn .dhead .sep{flex:1}
  .subline{display:flex;gap:8px;align-items:flex-start;margin-bottom:6px}
  .subline .reftag{font-weight:600;color:#3a4a78;min-width:62px;padding-top:8px;font-size:12px}
  .subline input{flex:1}
  .fonte-block{border:1px solid var(--line);border-left:3px solid var(--cage-teal);border-radius:8px;padding:10px 12px 2px;margin-bottom:10px;background:#fbfcfe}
  .fonte-block .fhead{display:flex;align-items:center;gap:8px;margin-bottom:10px;flex-wrap:wrap}
  .fonte-block .fhead .ref{font-weight:700;color:var(--cage-navy);font-size:13px;white-space:nowrap}
  .fonte-block .fhead select{flex:1;min-width:140px;max-width:240px;font-size:12.5px;padding:5px 7px;color:#3a4a78}
  .fonte-block .fhead .sep{flex:1}
  .addbtn{background:#e3f8f5;color:#00665c;border:1px dashed var(--cage-teal)}
  .risk-card{border-left:4px solid var(--cage-navy)}
  .badge{display:inline-block;padding:2px 8px;border-radius:10px;font-size:11px;font-weight:600}
  .escopo-yes{background:#dff5e6;color:#176b32}
  .escopo-no{background:#fde6e6;color:#8a1c1c}
  /* tables */
  table.grid{border-collapse:collapse;width:100%;font-size:12.5px}
  table.grid th,table.grid td{border:1px solid var(--line);padding:6px 8px;vertical-align:top;text-align:left}
  table.grid th{background:var(--cage-navy);color:#fff;font-weight:600;position:sticky;top:0}
  .calc{background:#f4f8ff}
  .calc.overridden{background:#fffbe0;outline:1px dashed #c9a400}
  .calc .sugg{display:block;font-size:11px;color:var(--muted);margin-top:2px}
  .clz{padding:2px 6px;border-radius:4px;font-weight:600;display:inline-block}
  .clz-Crítico,.clz-Extremo{background:var(--crit-bg);color:var(--crit-tx)}
  .clz-Alto,.clz-Alto\/Extremo{background:var(--alto-bg);color:var(--alto-tx)}
  .clz-Moderado,.clz-Médio,.clz-Médio\/Alto{background:var(--mod-bg);color:var(--mod-tx)}
  .clz-Baixo,.clz-Baixo\/Médio{background:var(--baixo-bg);color:var(--baixo-tx)}
  .clz-Irrelevante,.clz-Insignificante{background:var(--irr-bg);color:var(--irr-tx)}
  .scroll-x{overflow-x:auto;border:1px solid var(--line);border-radius:8px}
  /* heat map */
  .heat{border-collapse:collapse;margin:10px 0}
  .heat td,.heat th{border:1px solid #fff;width:92px;height:60px;text-align:center;font-size:12px;vertical-align:middle}
  .heat th{background:var(--cage-navy);color:#fff;width:auto;padding:4px 8px}
  .heat .cellval{font-weight:700;font-size:13px}
  .heat .dots{font-size:10px;margin-top:3px;color:#000}
  .heat td.has{outline:3px solid var(--cage-navy);outline-offset:-3px}
  .legend{display:flex;gap:12px;flex-wrap:wrap;margin-top:10px;font-size:12px}
  .legend span{display:inline-flex;align-items:center;gap:5px}
  .legend i{width:14px;height:14px;border-radius:3px;display:inline-block}
  .toggle{display:inline-flex;align-items:center;gap:6px;font-size:12px;font-weight:500;color:#2a3550;cursor:pointer}
  .ovr-wrap{margin-top:4px}
  .ovr-just{margin-top:4px}
  details.cat>summary{cursor:pointer;font-weight:600;color:var(--cage-navy);padding:6px 0}
  details.cat ul{margin:4px 0 10px;padding-left:18px}
  details.cat li{margin:2px 0;display:flex;gap:8px;align-items:center}
  details.cat li span{flex:1}
  .pill{font-size:11px;background:#eef2fb;border-radius:10px;padding:2px 9px;color:#33406a}
  .notice{background:#fff8e1;border:1px solid #ffe082;border-radius:8px;padding:8px 12px;font-size:12.5px;margin-bottom:12px}
  .empty{color:var(--muted);font-style:italic;padding:8px 0}
  @media (max-width:820px){
    .wrap{flex-direction:column}
    nav.side{width:100%;display:flex;flex-wrap:wrap;border-right:none;border-bottom:1px solid var(--line)}
    nav.side .group{width:100%}
    nav.side .navitem{border-left:none;border-bottom:3px solid transparent}
    .grid2,.grid3,.grid-dt{grid-template-columns:1fr}
    header.appbar h1{font-size:15px}
  }
  /* print */
  @media print{
    header.appbar,.toolbar,nav.side,.info,.addbtn,.dyn .dhead button,.no-print{display:none!important}
    .wrap{display:block}
    main{max-width:none;padding:0}
    .card{box-shadow:none;border:1px solid #999;break-inside:avoid}
    body{background:#fff;font-size:11px}
    .printonly{display:block!important}
  }
  .printonly{display:none}
</style>
</head>

<script>
/* ============================================================
   CAGE/RS – Plano de Auditoria — app de arquivo único
   Dados extraídos de plano_cage.xlsx (abas Listas e Orientações)

/* ---------- Enums fixos ---------- */
const PROB = ["Raro","Improvável","Possível","Provável","Esperado"];
const PROB_SCORE = {Raro:1,"Improvável":2,"Possível":3,"Provável":4,Esperado:5};
const IMP = ["Irrelevante","Baixo","Moderado","Alto","Crítico"];
const IMP_SCORE = {Irrelevante:1,Baixo:2,Moderado:3,Alto:4,"Crítico":5};
const CTRL = ["Forte","Satisfatório","Mediano","Fraco","Inexistente"];
const CTRL_SCORE = {Forte:5,"Satisfatório":4,Mediano:3,Fraco:2,Inexistente:1};
const CTRL_FUNC = {Forte:"Efetivo","Satisfatório":"Necessita de pequenas melhorias",Mediano:"Necessita de grandes melhorias",Fraco:"Necessita ser redesenhado",Inexistente:"Necessário desenvolver"};
const CTRL_DESC = {
  Forte:"O controle funciona adequadamente. Institucionalizado e sustentado por ferramentas adequadas, em nível de “melhor prática”; mitiga o risco em todos os aspectos relevantes.",
  "Satisfatório":"Pequenas inconsistências. Institucionalizado, passível de aperfeiçoamento, mas mitiga o risco razoavelmente.",
  Mediano:"Apresenta inconsistências. Razoavelmente institucionalizado, pode falhar por não contemplar todos os aspectos ou por desenho/ferramentas inadequados.",
  Fraco:"Grandes inconsistências. Não institucionalizado; na esfera pessoal dos operadores; em geral manual.",
  Inexistente:"Controle não existe, não funciona ou não está implementado."
};
const CONCLUSAO_ESCOPO = ["Escopo","Não será avaliado"];
const CONCLUSAO_AVAL = ["Satisfatório","Insatisfatório","Inconclusivo","Não Aplicável"];
const STATUS_EXEC = ["Não Iniciado","Em execução","Concluído"];
const CLASSES_ORDER = ["Irrelevante","Baixo","Moderado","Alto","Crítico"];

/* ---------- Classificação do Risco Inerente (faixas contíguas 1-25) ---------- */
function classInerente(pxi){
  if(pxi==null||isNaN(pxi)) return "";
  if(pxi<=5) return "Irrelevante";
  if(pxi<=10) return "Baixo";
  if(pxi<=15) return "Moderado";
  if(pxi<=20) return "Alto";
  return "Crítico";
}

/* ---------- Matriz combinada Inerente × Controle ---------- */
const SINT_IRR = "Pelo princípio da eficiência e custo-benefício, não é justificável trabalhar estes riscos.";
const SINT_BAIXO = "Pelo custo-benefício, não seria necessário trabalhar; mas poderão ser testados conforme avaliação do auditor.";
const T_OPC = "Realizar testes apenas se o auditor julgar necessário";
const T_SUB = "Testes substantivos";
const T_SUBP = "+Testes substantivos";
const T_SUBC = "Testes substantivos/Testes de Controles";
const TAB = {};
function setTab(iner,ctrl,residual,sintese,teste,prio){ TAB[iner+"|"+ctrl]={residual,sintese,teste,prioridade:prio}; }
CTRL.forEach(c=>setTab("Irrelevante",c,"Insignificante",SINT_IRR,T_OPC,"Mínima"));
CTRL.forEach(c=>setTab("Baixo",c,"Baixo",SINT_BAIXO,T_OPC,"Muito baixa"));
setTab("Moderado","Inexistente","Médio","Controle inexiste. Exame pode confirmar consequências adversas da ausência do controle.",T_SUB,"Alta");
setTab("Moderado","Fraco","Baixo/Médio","Controle inadequado. Exame pode confirmar consequências adversas da inadequação.",T_SUBP,"Alta, dependerá do nível dos riscos que o controle pretende mitigar");
setTab("Moderado","Mediano","Baixo/Médio","Efetividade pode ser testada; ao mesmo tempo confirmar consequências de funcionamento não ideal.",T_SUBC,"Alta, dependerá do nível dos riscos que o controle pretende mitigar");
setTab("Moderado","Satisfatório","Baixo/Médio","Adequado na avaliação preliminar; testar aplicação/efetividade.",T_SUBC,"Baixa");
setTab("Moderado","Forte","Baixo","Forte na avaliação preliminar; testar aplicação/efetividade.",T_SUBC,"Baixa");
setTab("Alto","Inexistente","Alto","Controle inexiste. Exame pode confirmar consequências adversas.",T_SUB,"Muito alta");
setTab("Alto","Fraco","Médio/Alto","Controle inadequado. Exame pode confirmar consequências da inadequação.",T_SUBP,"Alta");
setTab("Alto","Mediano","Médio/Alto","Efetividade pode ser testada; confirmar consequências de funcionamento não ideal.",T_SUBC,"Alta, dependerá do nível dos riscos que o controle pretende mitigar");
setTab("Alto","Satisfatório","Médio","Adequado na avaliação preliminar; testar aplicação/efetividade.",T_SUBC,"Baixa");
setTab("Alto","Forte","Baixo/Médio","Forte na avaliação preliminar; testar aplicação/efetividade.",T_SUBC,"Baixa");
setTab("Crítico","Inexistente","Extremo","Controle inexiste. Exame pode confirmar consequências adversas.",T_SUB,"Muito alta");
setTab("Crítico","Fraco","Alto/Extremo","Controle inadequado. Exame pode confirmar consequências da inadequação.",T_SUBP,"Muito alta");
setTab("Crítico","Mediano","Alto","Efetividade pode ser testada; confirmar consequências de funcionamento não ideal.",T_SUBC,"Muito alta");
setTab("Crítico","Satisfatório","Médio/Alto","Adequado na avaliação preliminar; testar aplicação/efetividade.",T_SUBC,"Alta");
setTab("Crítico","Forte","Médio","Forte na avaliação preliminar; testar aplicação/efetividade.",T_SUBC,"Alta");

/* ---------- Mapa de calor (pesos corrigidos) ---------- */
const HEAT_IMP = {"Crítico":10,Alto:8,Moderado:5,Baixo:3,Irrelevante:1};
const HEAT_PROB = {Raro:1,"Improvável":3,"Possível":5,"Provável":8,Esperado:10};
function heatClass(v){
  if(v<=5) return "Irrelevante";
  if(v<=15) return "Baixo";
  if(v<=30) return "Moderado";
  if(v<=64) return "Alto";
  return "Crítico";
}

function calcRisco(r){
  const ps = PROB_SCORE[r.probabilidade]||null;
  const is = IMP_SCORE[r.impacto]||null;
  const pxi = (ps&&is)? ps*is : null;
  const inerCalc = classInerente(pxi);
  const iner = (r.override.classificacaoInerente)||inerCalc;
  const ctrlDesc = r.avaliacaoControle? CTRL_DESC[r.avaliacaoControle] : "";
  let comb = (iner&&r.avaliacaoControle)? TAB[iner+"|"+r.avaliacaoControle] : null;
  const residualCalc = comb? comb.residual : "";
  const sinteseCalc = comb? comb.sintese : "";
  const testeCalc = comb? comb.teste : "";
  const prioCalc = comb? comb.prioridade : "";
  return {
    ps,is,pxi,
    inerCalc, iner,
    ctrlScore: r.avaliacaoControle? CTRL_SCORE[r.avaliacaoControle]:null,
    ctrlFunc: r.avaliacaoControle? CTRL_FUNC[r.avaliacaoControle]:"",
    ctrlDesc,
    residualCalc, residual:(r.override.classificacaoResidual)||residualCalc,
    sintese:sinteseCalc,
    testeCalc, teste:(r.override.testeRecomendado)||testeCalc,
    prioCalc, prioridade:(r.override.prioridade)||prioCalc
  };
}

/* ============================================================

   ============================================================ */
const LS_KEY = "cage_plano_auditoria_v1";
let lsOK = true;
let saveTimer = null;
function touch(){ state.meta.atualizadoEm = nowISO(); scheduleAutosave(); }
function scheduleAutosave(){
  if(saveTimer) clearTimeout(saveTimer);
  saveTimer = setTimeout(autosave, 600);
}
function autosave(){
  if(!lsOK) return;
  try{
    localStorage.setItem(LS_KEY, JSON.stringify(state));
    const d = new Date();
    setSaveState("Salvo automaticamente "+d.toLocaleTimeString("pt-BR"));
  }catch(e){
    lsOK=false;
    setSaveState("⚠ Autosave indisponível (use Baixar JSON)");
  }
}
function setSaveState(t){ const el=document.getElementById("savestate"); if(el) el.textContent=t; }
function tryLoadAutosave(){
  try{
    const raw = localStorage.getItem(LS_KEY);
    if(raw){
      const obj = JSON.parse(raw);
      if(obj && obj.entendimento && obj.riscos){ state = migrate(obj); reseq(); return true; }
    }
  }catch(e){ lsOK=false; }
  return false;
}
function migrate(obj){
  // garante campos ausentes
  obj.meta = obj.meta||{versao:"1.0"};
  obj.planejamento = obj.planejamento||{questaoGeral:"",subquestoesPorRisco:{},respostaQuestaoGeral:""};
  obj.planejamento.subquestoesPorRisco = obj.planejamento.subquestoesPorRisco||{};
  obj.achados = obj.achados||{byKey:{}};
  obj.achados.byKey = obj.achados.byKey||{};
  (obj.riscos||[]).forEach(r=>{
    r.override = r.override||{classificacaoInerente:null,justificativaClassInerente:"",classificacaoResidual:null,justificativaClassResidual:"",testeRecomendado:null,justificativaTeste:"",prioridade:null,justificativaPrioridade:""};
    if(!Array.isArray(r.fontes)){
      // migra formatos antigos: fonteRisco por risco e listas separadas de causas/consequências
      const causas=r.causas||[], cons=r.consequencias||[];
      const antiga=(r.fonteRisco&&(r.fonteRisco.tipo||r.fonteRisco.categoria))? r.fonteRisco : null;
      const n=Math.max(causas.length,cons.length,1);
      r.fontes=[];
      for(let i=0;i<n;i++){
        const c=causas[i], q=cons[i];
        const fc=(c&&c.fonte&&(c.fonte.tipo||c.fonte.categoria))? c.fonte
               : (q&&q.fonte&&(q.fonte.tipo||q.fonte.categoria))? q.fonte
               : (antiga||{});
        r.fontes.push({id:uid(),tipo:fc.tipo||"",categoria:fc.categoria||"",causa:(c&&c.texto)||"",consequencia:(q&&q.texto)||""});
      }
    }
    r.fontes.forEach(f=>{ f.id=f.id||uid(); f.tipo=f.tipo||""; f.categoria=f.categoria||""; f.causa=f.causa||""; f.consequencia=f.consequencia||""; });
    delete r.fonteRisco; delete r.causas; delete r.consequencias;
  });
  return obj;
}
function reseq(){
  // recalcula _seq para evitar colisão de ids ao adicionar novos
  let max = 1;
  const scan = s => { const m=/^i(\d+)_/.exec(s||""); if(m) max=Math.max(max,parseInt(m[1])); };
  state.entendimento.objetivos.forEach(o=>scan(o.id));
  state.riscos.forEach(r=>{ scan(r.id); r.fontes.forEach(f=>scan(f.id)); });
  Object.values(state.planejamento.subquestoesPorRisco).forEach(arr=>arr.forEach(s=>scan(s.id)));
  _seq = max+1;
}

function exportJSON(){
  const blob = new Blob([JSON.stringify(state,null,2)],{type:"application/json"});
  const nome = "plano-auditoria-"+(slug(state.entendimento.unidadeAuditada)||"sem-unidade")+".json";
  download(blob,nome);
}
function importJSON(ev){
  const f = ev.target.files[0]; if(!f) return;
  const rd = new FileReader();
  rd.onload = e=>{
    try{
      const obj = JSON.parse(e.target.result);
      if(!obj.entendimento||!obj.riscos) throw new Error("Estrutura inválida");
      state = migrate(obj); reseq(); render();
      autosave(); setSaveState("Auditoria carregada de arquivo");
    }catch(err){ alert("Arquivo inválido: "+err.message); }
  };
  rd.readAsText(f);
  ev.target.value="";
}

function download(blob,nome){
  const a=document.createElement("a"); a.href=URL.createObjectURL(blob); a.download=nome;
  document.body.appendChild(a); a.click();
  setTimeout(()=>{URL.revokeObjectURL(a.href);a.remove();},100);
}
function slug(s){ return (s||"").toLowerCase().normalize("NFD").replace(/[̀-ͯ]/g,"").replace(/[^a-z0-9]+/g,"-").replace(/^-|-$/g,"").slice(0,40); }

function esc(s){ return (s==null?"":String(s)).replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;").replace(/"/g,"&quot;"); }
function optionList(arr,sel){ return ['<option value=""></option>'].concat(arr.map(v=>`<option value="${esc(v)}"${v===sel?" selected":""}>${esc(v)}</option>`)).join(""); }

  return `<input type="text" value="${esc(val||'')}" placeholder="Informe o nome" oninput="setPath('${path}',this.value)">`;

function infoIcon(key){ return `<i class="info" title="Clique para ver a orientação" onclick="toggleHint(this)">i</i><div class="hint">${esc(ORIENT[key]||"")}</div>`; }

/* navegação por caminho: set(path, value) */
function setPath(path,value){
  const parts = path.split(".");
  let o = state;
  for(let i=0;i<parts.length-1;i++) o=o[parts[i]];
  o[parts[parts.length-1]] = value;
  touch();
}

function progresso(tab){
  const e = state.entendimento;
  switch(tab){
    case "entendimento":{
      const campos=[e.unidadeAuditada,e.numBaseAuditoria,e.objeto,e.coordenador,e.entendimentoObjeto,e.objetivos.some(o=>o.texto.trim())?"x":""];
      return pct(campos.filter(c=>(c||"").toString().trim()).length, campos.length);
    }
    case "identificacao":{
      if(!state.riscos.length) return 0;
      const ok = state.riscos.filter(r=>r.texto.trim()).length;
      return pct(ok,state.riscos.length);
    }
    case "matriz":{
      if(!state.riscos.length) return 0;
      const ok = state.riscos.filter(r=>r.probabilidade&&r.impacto&&r.avaliacaoControle&&r.conclusaoCoordenador).length;
      return pct(ok,state.riscos.length);
    }
    case "calor":{
      const plot = state.riscos.filter(r=>r.probabilidade&&r.impacto).length;
      return pct(plot, state.riscos.length||1);
    }
    case "planejamento":{
      const esc = riscosEmEscopo();
      if(!esc.length) return 0;
      const ok = esc.filter(r=>subsDoRisco(r.id).some(s=>s.texto.trim())).length;
      return pct(ok,esc.length);
    }
    case "achados":
    case "referencia":{
      const linhas = gerarLinhasAchados();
      if(!linhas.length) return 0;
      const ok = linhas.filter(l=>{const a=state.achados.byKey[l.key]||{};return (a.situacao||"").trim()||(a.conclusao||"").trim();}).length;
      return pct(ok,linhas.length);
    }
    default: return null;
  }
}
function pct(a,b){ return b? Math.round(100*a/b):0; }

function renderNav(){
  const nav=document.getElementById("nav");
  let html="", grp="";
  TABS.forEach(t=>{
    if(t.grp!==grp){ grp=t.grp; html+=`<div class="group">${grp}</div>`; }
    const p = progresso(t.id);
    const pillHtml = p===null? "" : `<span class="pct${p>=100?" full":""}">${p}%</span>`;
    html+=`<div class="navitem${t.id===activeTab?" active":""}" onclick="go('${t.id}')">${esc(t.label)}${pillHtml}</div>`;
  });
  nav.innerHTML=html;
}

  const e=state.entendimento;
  document.getElementById("topctx").innerHTML =
    (e.unidadeAuditada? `<b>${esc(e.unidadeAuditada.split(" - ").pop())}</b>`:"<i>Unidade não definida</i>") +
    (e.numBaseAuditoria? ` · Base <b>${esc(e.numBaseAuditoria)}</b>`:"");
}
function go(tab){ activeTab=tab; render(); window.scrollTo(0,0); }

function render(){
  renderNav(); renderTopCtx();
  const c=document.getElementById("content");
  const sy = window.scrollY;
  switch(activeTab){
    case "entendimento": c.innerHTML=viewEntendimento(); break;
    case "identificacao": c.innerHTML=viewIdentificacao(); break;
    case "matriz": c.innerHTML=viewMatriz(); break;
    case "calor": c.innerHTML=viewCalor(); break;
    case "planejamento": c.innerHTML=viewPlanejamento(); break;
    case "achados": c.innerHTML=viewAchados(false); break;
    case "referencia": c.innerHTML=viewAchados(true); break;
    case "vulnerabilidades": c.innerHTML=viewVulnerabilidades(); break;
    case "tabelas": c.innerHTML=viewTabelas(); break;
    case "orientacoes": c.innerHTML=viewOrientacoes(); break;
  }
  window.scrollTo(0,sy);
}

function setFonteTipo(ri,fi,v){
  const f=state.riscos[ri].fontes[fi];
  f.tipo=v; f.categoria=""; touch(); render();
}
function setFonteCategoria(ri,fi,v){
  const f=state.riscos[ri].fontes[fi];
  f.categoria=v; touch();
  // auto-sugere vulnerabilidade do catálogo se a causa estiver vazia
  if(v && !f.causa.trim()){ sugerirCausa(ri,fi); } else { render(); }
}
function sugerirCausa(ri,fi){
  const r=state.riscos[ri], f=r.fontes[fi];
  const itens=(CATALOGO[f.tipo]||{})[f.categoria]||[];
  if(!itens.length){ render(); return; }
  // usa a primeira vulnerabilidade da categoria ainda não utilizada neste risco
  const usados = r.fontes.map(x=>x.causa.trim());
  f.causa = itens.find(t=>!usados.includes(t)) || itens[0];
  touch(); render();
}
function addRisco(){ state.riscos.push(novoRisco()); touch(); render(); }
function removeRisco(id){
  if(state.riscos.length<=1){ alert("Mantenha ao menos 1 risco."); return; }
  const r=state.riscos.find(x=>x.id===id);
  const temConteudo = r && (r.texto.trim()||r.fontes.some(f=>f.causa.trim()||f.consequencia.trim())||r.probabilidade||r.conclusaoCoordenador);
  if(temConteudo && !confirm("Remover o risco e tudo encadeado (causas, consequências, planejamento e achados)?")) return;
  state.riscos=state.riscos.filter(x=>x.id!==id);
  delete state.planejamento.subquestoesPorRisco[id];
  Object.keys(state.achados.byKey).forEach(k=>{ if(k.startsWith(id+":")) delete state.achados.byKey[k]; });
  touch(); render();
}
function addFonte(rid){ const r=state.riscos.find(x=>x.id===rid); r.fontes.push(novaFonte()); touch(); render(); }
function removeFonte(rid,fid){ const r=state.riscos.find(x=>x.id===rid);
  if(r.fontes.length<=1){ alert("Mantenha ao menos 1 fonte do risco."); return; }
  const f=r.fontes.find(x=>x.id===fid);
  if(f&&(f.causa.trim()||f.consequencia.trim())&&!confirm("Remover esta fonte com sua causa e consequência?")) return;
  r.fontes=r.fontes.filter(x=>x.id!==fid); touch(); render(); }

function clzSpan(v){ return v? `<span class="clz clz-${esc(v)}">${esc(v)}</span>`:""; }
function overrideCell(ri,campo,calcVal,opcoes){
  const r=state.riscos[ri];
  const ov=r.override[campo];
  const just = r.override["justificativa"+campo.charAt(0).toUpperCase()+campo.slice(1).replace("classificacao","Class")] ;
  // mapeia nome da justificativa
  const justKey = {classificacaoInerente:"justificativaClassInerente",classificacaoResidual:"justificativaClassResidual",testeRecomendado:"justificativaTeste",prioridade:"justificativaPrioridade"}[campo];
  const justVal = r.override[justKey];
  const overridden = ov!=null && ov!=="";
  let selOrInput;
  if(opcoes){
    selOrInput = `<select class="sm" onchange="setOverride(${ri},'${campo}','${justKey}',this.value)">${optionList(opcoes,ov||"")}</select>`;
  } else {
    selOrInput = `<input class="sm" type="text" value="${esc(ov||"")}" onchange="setOverride(${ri},'${campo}','${justKey}',this.value)" placeholder="valor manual">`;
  }
  return `<div class="calc${overridden?' overridden':''}">
    ${overridden? `<b>${campo==='classificacaoInerente'||campo==='classificacaoResidual'?clzSpan(ov):esc(ov)}</b> 🖊` : (campo==='classificacaoInerente'||campo==='classificacaoResidual'?clzSpan(calcVal):esc(calcVal)||"—")}
    <span class="sugg">sugerido: ${campo==='classificacaoInerente'||campo==='classificacaoResidual'?(calcVal||"—"):esc(calcVal)||"—"}</span>
    <label class="toggle" style="margin-top:4px"><input type="checkbox" ${overridden?'checked':''} onchange="toggleOverride(${ri},'${campo}','${justKey}',this.checked)"> ajustar manualmente</label>
    <div class="ovr-wrap" style="${overridden?'':'display:none'}">
      ${selOrInput}
      <textarea class="ovr-just ${overridden&&!(justVal||'').trim()?'req-empty':''}" placeholder="Justificativa (obrigatória)" oninput="r_setJust(${ri},'${justKey}',this.value)" style="min-height:42px;margin-top:4px">${esc(justVal||"")}</textarea>
    </div>
  </div>`;
}
function setOverride(ri,campo,justKey,val){ state.riscos[ri].override[campo]= val||null; touch(); render(); }
function toggleOverride(ri,campo,justKey,on){
  if(on){ const cr=calcRisco(state.riscos[ri]); const calc={classificacaoInerente:cr.inerCalc,classificacaoResidual:cr.residualCalc,testeRecomendado:cr.testeCalc,prioridade:cr.prioCalc}[campo]; state.riscos[ri].override[campo]=calc||" "; }
  else { state.riscos[ri].override[campo]=null; state.riscos[ri].override[justKey]=""; }
  touch(); render();
}
function r_setJust(ri,justKey,val){ state.riscos[ri].override[justKey]=val; touch(); }

/* ============================================================
   4. MAPA DE CALOR
   ============================================================ */
function viewCalor(){
  const impRows=["Crítico","Alto","Moderado","Baixo","Irrelevante"];
  const probCols=["Raro","Improvável","Possível","Provável","Esperado"];
  // mapeia riscos por celula
  const plot={};
  state.riscos.forEach((r,ri)=>{ if(r.probabilidade&&r.impacto){ const k=r.impacto+"|"+r.probabilidade; (plot[k]=plot[k]||[]).push("R"+(ri+1)); } });
  let rows = impRows.map(imp=>{
    let tds = probCols.map(pb=>{
      const v=HEAT_IMP[imp]*HEAT_PROB[pb];
      const cl=heatClass(v);
      const k=imp+"|"+pb;
      const has=plot[k];
      const bg={Irrelevante:"var(--irr-bg)",Baixo:"var(--baixo-bg)",Moderado:"var(--mod-bg)",Alto:"var(--alto-bg)","Crítico":"var(--crit-bg)"}[cl];
      return `<td style="background:${bg}" class="${has?'has':''}">
        <div class="cellval">${v}</div>${has?`<div class="dots">${has.join(", ")}</div>`:""}</td>`;
    }).join("");
    return `<tr><th>${imp} (${HEAT_IMP[imp]})</th>${tds}</tr>`;
  }).join("");
  const header = `<tr><th>Impacto ↓ / Prob →</th>${probCols.map(p=>`<th>${p} (${HEAT_PROB[p]})</th>`).join("")}</tr>`;
  return `<div class="card"><h2>Mapa de Calor</h2>
    <div class="sub">Grade 5×5 (Impacto × Probabilidade), pesos corrigidos. Cada risco é plotado pela combinação escolhida na Matriz.</div>
    ${autoHeader()}
    <div class="scroll-x"><table class="heat">${header}${rows}</table></div>
    <div class="legend">
      <span><i style="background:var(--crit-bg)"></i>Crítico</span>
      <span><i style="background:var(--alto-bg)"></i>Alto</span>
      <span><i style="background:var(--mod-bg)"></i>Moderado</span>
      <span><i style="background:var(--baixo-bg)"></i>Baixo</span>
      <span><i style="background:var(--irr-bg)"></i>Irrelevante</span>
    </div>
    <p class="sub" style="margin-top:10px">Mapa ilustrativo (escala 1/3/5/8/10). A classificação oficial usa P×I (escala 1–5) e as faixas das Tabelas.</p>
  </div>`;
}

  const escopo = riscosEmEscopo();

  } else {
    blocos = escopo.map(r=>{
      const ri = state.riscos.indexOf(r);
      const subs = subsDoRisco(r.id);
      const linhas = subs.map((s,si)=>`
        <div class="dyn">
          <div class="dhead"><span class="ref">Subquestão ${ri+1}.${si+1}</span><span class="pill">PT${ri+1}.${si+1}</span><span class="sep"></span>
            <button class="danger sm" onclick="removeSub('${r.id}','${s.id}')">× remover</button></div>
          <div class="field"><label>Subquestão ${infoIcon('subquestao')}</label>
            <textarea oninput="subSet('${r.id}','${s.id}','texto',this.value)">${esc(s.texto)}</textarea></div>
          <div class="grid2">
            <div class="field"><label>Critério ${infoIcon('criterio')}</label>
              <textarea oninput="subSet('${r.id}','${s.id}','criterio',this.value)">${esc(s.criterio||"")}</textarea></div>
            <div class="field"><label>Procedimentos de Auditoria ${infoIcon('procedimentos')}</label>
              <textarea oninput="subSet('${r.id}','${s.id}','procedimentos',this.value)">${esc(s.procedimentos||"")}</textarea></div>
          </div>
        </div>`).join("");
      return `<div class="card risk-card">
        <div class="dhead"><span class="ref">R${ri+1}</span> <span style="margin-left:8px">${esc(r.texto)||'<span class="empty">(sem texto)</span>'}</span></div>
        ${linhas||'<div class="empty">Sem subquestões.</div>'}
        <button class="addbtn sm" onclick="addSub('${r.id}')">+ subquestão</button>
      </div>`;
    }).join("");
  }
  return `<div class="card"><h2>Matriz de Planejamento</h2>
      <div class="sub">Recebe apenas os riscos em escopo. Subquestões dinâmicas com Critério, Procedimentos e Programa de Trabalho (PT).</div>
      ${autoHeader()}
      <div class="field"><label>Questão Geral de Auditoria ${infoIcon('questaoGeral')}</label>
        <textarea oninput="setPath('planejamento.questaoGeral',this.value)">${esc(state.planejamento.questaoGeral)}</textarea></div>
    </div>
    ${blocos}
    <div class="card"><div class="field"><label>Resposta à Questão Geral de Auditoria ${infoIcon('respostaGeral')}</label>
      <textarea style="min-height:90px" oninput="setPath('planejamento.respostaQuestaoGeral',this.value)">${esc(state.planejamento.respostaQuestaoGeral)}</textarea></div></div>`;
}
function addSub(rid){ subsDoRisco(rid).push({id:uid(),texto:"",criterio:"",procedimentos:""}); touch(); render(); }
function removeSub(rid,sid){
  const arr=subsDoRisco(rid);
  const s=arr.find(x=>x.id===sid);
  if(s&&(s.texto||"").trim()&&!confirm("Remover esta subquestão (e seus achados)?")) return;
  state.planejamento.subquestoesPorRisco[rid]=arr.filter(x=>x.id!==sid);
  delete state.achados.byKey[rid+":"+sid];
  touch(); render();
}
function subSet(rid,sid,campo,val){ const s=subsDoRisco(rid).find(x=>x.id===sid); if(s){ s[campo]=val; touch(); } }

/* ============================================================
   6/7. MATRIZ DE ACHADOS / REFERÊNCIA
   ============================================================ */
function gerarLinhasAchados(){
  const linhas=[];
  riscosEmEscopo().forEach(r=>{
    const ri=state.riscos.indexOf(r);
    subsDoRisco(r.id).forEach((s,si)=>{
      linhas.push({
        key:r.id+":"+s.id, riscoId:r.id, subId:s.id,
        riscoRef:"R"+(ri+1), riscoTexto:r.texto,
        causas:r.fontes.map((f,fi)=>"Cs "+(ri+1)+"."+(fi+1)+causaComFonte(f)).filter(t=>t.includes(" - ")).join("; "),
        conseqs:r.fontes.map((f,fi)=>"Cq "+(ri+1)+"."+(fi+1)+conseqComFonte(f)).filter(t=>t.includes(" - ")).join("; "),
        subRef:(ri+1)+"."+(si+1), subTexto:s.texto, criterio:s.criterio||""
      });
    });
  });
  return linhas;
}
function aSet(key,campo,val){ const a=state.achados.byKey[key]=state.achados.byKey[key]||{}; a[campo]=val; touch(); }
function viewAchados(isRef){
  const linhas=gerarLinhasAchados();
  if(!linhas.length){
    return `<div class="card"><h2>${isRef?"Matriz de Referência":"Matriz de Achados"}</h2>
      ${autoHeader()}
      <div class="notice">Sem linhas: gere subquestões para riscos <b>em escopo</b> na Matriz de Planejamento. (Fluxo religado — sem #REF!)</div></div>`;
  }
  const ta=(key,campo)=>{ const a=state.achados.byKey[key]||{}; return `<textarea class="sm" style="min-width:140px;min-height:48px" oninput="aSet('${key}','${campo}',this.value)">${esc(a[campo]||"")}</textarea>`; };
  let head, rows;
  if(isRef){
    head=`<th>Subquestão</th><th>Risco</th><th>Causa(s)</th><th>Consequência(s)</th><th>Critério(s)</th><th>Situação Encontrada</th><th>Recomendação</th><th>Benefício Esperado</th><th>Observações do Revisor</th>`;
    rows=linhas.map(l=>`<tr>
      <td><b>${l.subRef}</b><br>${esc(l.subTexto)}</td>
      <td><b>${l.riscoRef}</b><br>${esc(l.riscoTexto)}</td>
      <td>${esc(l.causas)}</td><td>${esc(l.conseqs)}</td><td>${esc(l.criterio)}</td>
      <td>${ta(l.key,'situacao')}</td><td>${ta(l.key,'recomendacao')}</td><td>${ta(l.key,'beneficio')}</td><td>${ta(l.key,'observacoes')}</td>
    </tr>`).join("");
  } else {
    head=`<th>Risco</th><th>Causa(s)</th><th>Consequência(s)</th><th>Subquestão</th><th>Critério(s)</th><th>Situação Encontrada</th><th>Conclusão Final</th><th>Recomendação</th><th>Benefício Esperado</th><th>Observações do Revisor</th>`;
    rows=linhas.map(l=>`<tr>
      <td><b>${l.riscoRef}</b><br>${esc(l.riscoTexto)}</td>
      <td>${esc(l.causas)}</td><td>${esc(l.conseqs)}</td>
      <td><b>${l.subRef}</b><br>${esc(l.subTexto)}</td><td>${esc(l.criterio)}</td>
      <td>${ta(l.key,'situacao')}</td><td>${ta(l.key,'conclusao')}</td><td>${ta(l.key,'recomendacao')}</td><td>${ta(l.key,'beneficio')}</td><td>${ta(l.key,'observacoes')}</td>
    </tr>`).join("");
  }
  return `<div class="card"><h2>${isRef?"Matriz de Referência":"Matriz de Achados"}</h2>
    <div class="sub">Gerada a partir das subquestões planejadas (riscos em escopo). ${isRef?"Ordem orientada à referência.":""}</div>
    ${autoHeader()}

}

function viewVulnerabilidades(){
  let target = `<div class="field" style="max-width:420px"><label>Inserir como causa no risco:</label>
    <select id="vulnTarget">${state.riscos.map((r,i)=>`<option value="${r.id}">R${i+1}${r.texto?" — "+esc(r.texto.slice(0,40)):""}</option>`).join("")}</select></div>`;
  let blocks = Object.keys(CATALOGO).map(tipo=>{
    let cats = Object.keys(CATALOGO[tipo]).map(cat=>{
      let items = CATALOGO[tipo][cat].map(it=>`<li><span>${esc(it)}</span><button class="sm addbtn" onclick="inserirComoCausa('${esc(tipo).replace(/'/g,"\\'")}','${esc(cat).replace(/'/g,"\\'")}','${esc(it).replace(/'/g,"\\'")}')">+ causa</button></li>`).join("");
      return `<details class="cat"><summary>${esc(cat)} <span class="pill">${CATALOGO[tipo][cat].length}</span></summary><ul>${items}</ul></details>`;
    }).join("");
    return `<div class="card"><div class="sectionbar">${esc(tipo)}</div>${cats}</div>`;
  }).join("");
  return `<div class="card"><h2>Catálogo de Vulnerabilidades</h2>
    <div class="sub">Fonte da sugestão automática de causas. Selecione um risco e clique “+ causa”: a vulnerabilidade é inserida como causa em uma Fonte do Risco com o tipo e a categoria correspondentes.</div>
    ${target}</div>${blocks}`;
}
function inserirComoCausa(tipo,cat,texto){
  const rid=document.getElementById("vulnTarget").value;
  const r=state.riscos.find(x=>x.id===rid); if(!r){ alert("Selecione um risco."); return; }
  // usa fonte sem causa (vazia ou da mesma categoria); senão adiciona nova fonte
  let alvo=r.fontes.find(f=>!f.causa.trim() && (!f.tipo || (f.tipo===tipo&&f.categoria===cat)));
  if(!alvo){ alvo=novaFonte(); r.fontes.push(alvo); }
  alvo.tipo=tipo; alvo.categoria=cat; alvo.causa=texto; touch();
  setSaveState("Causa inserida em R"+(state.riscos.indexOf(r)+1));
}

function fonteLabel(f){
  if(!f||(!f.tipo&&!f.categoria)) return "";
  const t = f.tipo==="Fontes Internas"?"Interna":(f.tipo==="Fontes Externas"?"Externa":f.tipo);
  return [t,f.categoria].filter(Boolean).join(" / ");
}
function causaComFonte(f){ const fl=fonteLabel(f); return f.causa? " - "+f.causa+(fl?" [Fonte: "+fl+"]":"") : ""; }
function conseqComFonte(f){ const fl=fonteLabel(f); return f.consequencia? " - "+f.consequencia+(fl?" [Fonte: "+fl+"]":"") : ""; }
function relTextoCausas(r,ri){ return r.fontes.map((f,fi)=>"Cs "+(ri+1)+"."+(fi+1)+causaComFonte(f)).join("\n"); }
function relTextoConseq(r,ri){ return r.fontes.map((f,fi)=>"Cq "+(ri+1)+"."+(fi+1)+conseqComFonte(f)).join("\n"); }
